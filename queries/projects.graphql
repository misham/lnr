# @genqlient
query ListProjects($filter: ProjectFilter, $first: Int, $after: String) {
  projects(
    filter: $filter
    first: $first
    after: $after
  ) {
    nodes {
      id
      name
      description
      slugId
      color
      icon
      status { name color type }
      progress
      priority
      priorityLabel
      startDate
      targetDate
      lead { id name displayName email active }
      url
      createdAt
      updatedAt
      completedAt
      canceledAt
      archivedAt
    }
    pageInfo { hasNextPage endCursor }
  }
}

# @genqlient
query GetProject($id: String!) {
  project(id: $id) {
    id
    name
    description
    content
    slugId
    color
    icon
    status { name color type }
    progress
    priority
    priorityLabel
    startDate
    targetDate
    lead { id name displayName email active }
    url
    createdAt
    updatedAt
    completedAt
    canceledAt
    archivedAt
    projectMilestones {
      nodes {
        id
        name
        description
        targetDate
        sortOrder
      }
    }
  }
}

# @genqlient
query ListProjectIssues($id: String!, $first: Int, $after: String) {
  project(id: $id) {
    issues(first: $first, after: $after) {
      nodes {
        id
        identifier
        title
        description
        priority
        priorityLabel
        estimate
        dueDate
        url
        createdAt
        updatedAt
        completedAt
        archivedAt
        state { id name type color position }
        team { id name key }
        assignee { id name displayName email active }
        labels { nodes { id name color } }
        cycle { id name number }
        project { id name }
      }
      pageInfo { hasNextPage endCursor }
    }
  }
}
