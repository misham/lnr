name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  release:
    needs: ci
    runs-on: ubuntu-latest
    env:
      COMMIT_SHA: ${{ github.sha }}
      VERSION: ${{ github.ref_name }}
    steps:
      - name: Download source
        uses: actions/download-artifact@v8
        with:
          name: source
          run-id: ${{ needs.ci.outputs.artifact-run-id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate secrets
        env:
          LNR_CLIENT_ID: ${{ secrets.LNR_CLIENT_ID }}
        run: |
          if [ -z "${LNR_CLIENT_ID}" ]; then
            echo "ERROR: LNR_CLIENT_ID secret not set"
            exit 1
          fi

      - name: Build binary
        env:
          LNR_CLIENT_ID: ${{ secrets.LNR_CLIENT_ID }}
          GOOS: darwin
          GOARCH: arm64
        run: |
          make build \
            VERSION="${VERSION}" \
            COMMIT="${COMMIT_SHA:0:7}" \
            CLIENT_ID="${LNR_CLIENT_ID}"
          mv lnr lnr-darwin-arm64

      - name: Generate checksum
        run: sha256sum lnr-darwin-arm64 > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${VERSION}" \
            --title "lnr ${VERSION}" \
            --generate-notes \
            lnr-darwin-arm64 \
            checksums.txt
