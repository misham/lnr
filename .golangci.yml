version: "2"

linters:
  default: standard
  enable:
    - gosec
    - misspell
  settings:
    errcheck:
      check-type-assertions: true
  exclusions:
    paths:
      - internal/api/linear_graphql
    generated: strict

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      module-path: github.com/misham/linear-cli
