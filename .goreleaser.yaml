version: 2

builds:
  - main: ./cmd/lnr
    binary: lnr
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
    ldflags:
      - -s -w -X {{ .Env.MODULE }}/internal/version.Version={{.Version}} -X {{ .Env.MODULE }}/internal/version.Commit={{.Commit}} -X {{ .Env.MODULE }}/internal/version.Date={{.Date}} -X {{ .Env.MODULE }}/internal/auth.defaultClientID={{ .Env.LNR_CLIENT_ID }}

archives:
  - formats:
      - binary
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  draft: false
  mode: keep-existing

homebrew_casks:
  - repository:
      owner: misham
      name: homebrew-twistedkeg
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      pull_request:
        enabled: true
    directory: Casks
    homepage: "https://github.com/misham/linear-cli"
    description: "A CLI for Linear project management — manage issues, projects, cycles, and initiatives from the terminal"
    license: "MIT"
    binaries:
      - lnr
    hooks:
      post:
        install: |
          system_command "/bin/sh", args: ["-c", "/usr/bin/xattr -dr com.apple.quarantine #{staged_path}/lnr-*"]
